name: Phoenix research (long-only OOS)

# Validate the proven Phoenix engine LONG-only with a walk-forward out-of-sample
# split (the Phoenix tab only shows in-sample). Research only — never touches
# live signals or learning state.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 1095 = 3 tahun)"
        required: false
        default: "1095"
      engines:
        description: "Engine long dipisah koma (default fib,breakout)"
        required: false
        default: "fib,breakout"

permissions:
  contents: write

concurrency:
  group: phoenix-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Phoenix long-only OOS research
        env:
          PHOENIX_DAYS: ${{ github.event.inputs.days || '1095' }}
          PHOENIX_ENGINES: ${{ github.event.inputs.engines || 'fib,breakout' }}
        run: python -m scripts.research_phoenix
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/phoenix_research.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git pull --rebase origin ${{ github.ref_name }} || true
            git commit -m "chore: hasil riset Phoenix long OOS [skip ci]"
            for i in 1 2 3 4; do git push && break || { echo "retry $i"; sleep $((2**i)); git pull --rebase origin ${{ github.ref_name }} || true; }; done
          fi
