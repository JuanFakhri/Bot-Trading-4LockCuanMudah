name: XauBotSniper backtest (numpang jalan)

# Workflow sementara: menjalankan backtest repo XauBotSniper dari sini karena
# Actions di repo XauBotSniper (repo baru) belum aktif. Hasil disimpan ke
# data/xau_backtest.json di branch ini, lalu disalin ke XauBotSniper.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Berapa hari data historis"
        required: false
        default: "365"
  push:
    branches: [claude/trading-bot-multi-timeframe-w8y4y4]
    paths: [".github/workflows/xau_backtest.yml"]

permissions:
  contents: write

concurrency:
  group: xau-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone XauBotSniper
        run: git clone --depth 1 -b claude/trading-bot-multi-timeframe-w8y4y4 https://github.com/JuanFakhri/XauBotSniper xau

      - name: Jalankan backtest
        working-directory: xau
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '365' }}
        run: python -m bot.backtest

      - name: Simpan hasil ke branch ini
        run: |
          cp xau/docs/data/backtest.json data/xau_backtest.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/xau_backtest.json
          git commit -m "data: hasil backtest XauBotSniper (numpang jalan) [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
