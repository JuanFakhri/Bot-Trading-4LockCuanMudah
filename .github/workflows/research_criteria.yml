name: Research — high-probability criteria sweep

# Read-only research: test the user-requested HIGH-PROBABILITY confluence filters
# (MACD, EMA20 gate, RSI hard-gate, breakout+retest, raised Setup-Score) on the
# SHORT (SMC) machine over real history, with a walk-forward OOS split, and print
# a comparison table. Writes nothing — inspect the job log for the result.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 1095 = 3 tahun)"
        required: false
        default: "1095"

permissions:
  contents: read

concurrency:
  group: research-criteria
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run high-probability criteria sweep
        env:
          RESEARCH_DAYS: ${{ github.event.inputs.days || '1095' }}
        run: python -m scripts.research_criteria
