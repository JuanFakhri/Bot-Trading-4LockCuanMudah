name: Research — ABCD/ABC pattern sweep

# Read-only research: test the ABCD / ABC swing patterns (from reference images)
# standalone over real 1H history, with a walk-forward OOS split, and print a
# comparison table. Writes nothing — inspect the job log for the result.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 1095 = 3 tahun)"
        required: false
        default: "1095"

permissions:
  contents: read

concurrency:
  group: research-abcd
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ABCD/ABC pattern sweep
        env:
          RESEARCH_DAYS: ${{ github.event.inputs.days || '1095' }}
        run: python -m scripts.research_abcd
