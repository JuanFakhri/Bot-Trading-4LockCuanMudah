name: Research — BTC regime rule sweep (1D vs multi-TF)

# Read-only: rebuild the BTC regime from 1D+4H+1H under several combining rules
# and re-run the live two-machine backtest to see if a looser regime adds LONG
# trades without hurting win-rate / PF / OOS. Writes nothing — read the job log.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 1095 = 3 tahun)"
        required: false
        default: "1095"

permissions:
  contents: read

concurrency:
  group: research-regime
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run regime rule sweep
        env:
          RESEARCH_DAYS: ${{ github.event.inputs.days || '1095' }}
        run: python -m scripts.research_regime
