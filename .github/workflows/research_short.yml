name: Research — short machine relaxation sweep

# Read-only research: run the SHORT (SMC) machine standalone across relaxation
# variants (looser alignment / lower score / no session / no macro gate) over
# real Binance history and print a comparison table (trades / win% / PF / OOS).
# Writes nothing — inspect the job log for the result.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 1095 = 3 tahun)"
        required: false
        default: "1095"

permissions:
  contents: read

concurrency:
  group: research-short
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run short relaxation sweep
        env:
          RESEARCH_DAYS: ${{ github.event.inputs.days || '1095' }}
        run: python -m scripts.research_short
