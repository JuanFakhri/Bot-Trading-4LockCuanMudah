name: SMC backtest

# Jalankan manual (atau mingguan) untuk membacktest strategi FIB pada data
# historis Binance. Hasilnya ditampilkan di tab "Backtest" web, DAN bot belajar
# dari hasilnya (pola rugi diblokir, pola menang diprioritaskan) — pelajaran
# disimpan ke data/state.json sehingga dipakai di sinyal live.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Berapa hari data historis di-backtest (mis. 180, 365)"
        required: false
        default: "180"
      symbols:
        description: "Simbol dipisah koma (kosongkan = semua). Contoh: ETHUSDT,SOLUSDT"
        required: false
        default: ""
      score_th:
        description: "Ambang AI Score (default 60; lebih rendah = lebih banyak trade)"
        required: false
        default: "60"
      macro_gate:
        description: "Gate makro ForexFactory (1=on): LONG hanya jika kebijakan tidak risk-off, SHORT hanya jika tidak risk-on"
        required: false
        default: "0"
      macro_require_on:
        description: "1=LONG wajib RISK_ON (perkuat sinyal long yang lemah)"
        required: false
        default: "0"
      no_persist:
        description: "1=jangan tulis learning state (uji A/B, tidak menyentuh bot live)"
        required: false
        default: "0"
  schedule:
    - cron: "0 3 * * 0"          # tiap Minggu 03:00 UTC

permissions:
  contents: write

concurrency:
  group: fib-hybrid-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backtest (and learn from it)
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '180' }}
          BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols || '' }}
          BACKTEST_SCORE_TH: ${{ github.event.inputs.score_th || '60' }}
          BACKTEST_MACRO_GATE: ${{ github.event.inputs.macro_gate || '0' }}
          BACKTEST_MACRO_REQUIRE_ON: ${{ github.event.inputs.macro_require_on || '0' }}
          BACKTEST_NO_PERSIST: ${{ github.event.inputs.no_persist || '0' }}
        run: python -m scripts.run_backtest

      - name: Sync frontend to GitHub Pages folder
        run: cp frontend/index.html frontend/style.css frontend/app.js frontend/manifest.webmanifest frontend/sw.js frontend/icon-192.png frontend/icon-512.png docs/

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/state.json docs/data/backtest.json docs/index.html docs/style.css docs/app.js
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "chore: hasil backtest + pembelajaran [skip ci]"
            git push
          fi
