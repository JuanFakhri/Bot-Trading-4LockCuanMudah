name: SMC scan

# Bot berjalan sepenuhnya di GitHub: pindai pasar terjadwal, simpan hasil +
# pelajaran ke repo, lalu GitHub Pages menampilkannya. Tanpa server berbayar.
on:
  schedule:
    - cron: "*/15 * * * *"      # tiap ~15 menit (interval minimum GitHub Actions)
  workflow_dispatch:            # tombol "Run workflow" manual

# Butuh izin menulis untuk commit snapshot + state pembelajaran kembali ke repo.
permissions:
  contents: write

# Jangan jalankan dua scan bersamaan (hindari konflik commit).
concurrency:
  group: fib-hybrid-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market scan
        env:
          # Setelan live tervalidasi (730 hari data asli): 41 trade, PF 1.79,
          # win 65.9%, DD -5.26R, OOS PF 3.66.
          SMC_SCORE_TH: "60"         # ambang AI-Score
          SMC_VOL_MULT: "1.0"        # ATR-only (1.5 = mode 18-trade/PF 2.60)
        run: python -m scripts.github_scan

      - name: Sync frontend to GitHub Pages folder
        run: cp frontend/index.html frontend/style.css frontend/app.js frontend/manifest.webmanifest frontend/sw.js frontend/icon-192.png frontend/icon-512.png docs/

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/state.json docs/data/snapshot.json docs/index.html docs/style.css docs/app.js
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "chore: pembaruan scan otomatis [skip ci]"
            git push
          fi
