name: SMC variant test

# Uji varian (short-only, drop ETH+DOGE) di data asli. Menulis
# docs/data/variants.json. Tidak menyentuh bot live — riset.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 730, 1095)"
        required: false
        default: "1095"

permissions:
  contents: write

concurrency:
  group: smc-variants
  cancel-in-progress: false

jobs:
  variants:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run variant test
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '1095' }}
        run: python -m scripts.variants
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/variants.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "chore: hasil variant test [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin claude/fib-hybrid-trading-bot-elzm69 && git push && break
              echo "push retry $i"; sleep 3
            done
          fi
