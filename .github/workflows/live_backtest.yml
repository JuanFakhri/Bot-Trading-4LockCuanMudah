name: Live backtest (Phoenix long + SMC short)

# Backtest the LIVE two-machine bot on real Binance history: the LONG side runs
# Phoenix Hybrid, the SHORT side runs classic SMC. Reports a blended win-rate and
# a per-machine breakdown, and (unless no_persist) rebuilds the learning brain.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Berapa hari data historis (mis. 365, 1095 = 3 tahun)"
        required: false
        default: "1095"
      symbols:
        description: "Simbol dipisah koma (kosongkan = semua)"
        required: false
        default: ""
      no_persist:
        description: "1=jangan tulis learning state (uji dulu, tidak menyentuh live)"
        required: false
        default: "1"
  schedule:
    - cron: "0 3 * * 0"          # tiap Minggu 03:00 UTC — segarkan tab Backtest + otak-belajar

permissions:
  contents: write

concurrency:
  group: live-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live backtest (Phoenix long + SMC short)
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '1095' }}
          BACKTEST_SYMBOLS: ${{ github.event.inputs.symbols || '' }}
          # manual runs default to 1 (safe); the weekly schedule persists (0) so
          # the live learning brain is rebuilt from the live two-machine strategy
          BACKTEST_NO_PERSIST: ${{ github.event.inputs.no_persist || (github.event_name == 'schedule' && '0' || '1') }}
        run: python -m scripts.backtest_live

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/live_backtest.json data/state.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git pull --rebase origin ${{ github.ref_name }} || true
            git commit -m "chore: hasil live backtest Phoenix+SMC [skip ci]"
            for i in 1 2 3 4; do git push && break || { echo "retry $i"; sleep $((2**i)); git pull --rebase origin ${{ github.ref_name }} || true; }; done
          fi
