name: Gate research (BTC.D / USDT.D / macro)

# Test hard entry-gates (dominance + macro) on the live bot over 3y with OOS.
# Research only — never touches live signals/state.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 1095 = 3 tahun)"
        required: false
        default: "1095"

permissions:
  contents: write

concurrency:
  group: gates-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run gate research
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '1095' }}
        run: python -m scripts.research_gates
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/gates_research.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git pull --rebase origin ${{ github.ref_name }} || true
            git commit -m "chore: hasil riset gate dominasi/makro [skip ci]"
            for i in 1 2 3 4; do git push && break || { echo "retry $i"; sleep $((2**i)); git pull --rebase origin ${{ github.ref_name }} || true; }; done
          fi
