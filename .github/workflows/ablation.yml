name: SMC ablation study

# Menguji v1 baseline + tiap usulan perbaikan SATU PER SATU pada data asli,
# lalu menulis docs/data/ablation.json (tabel perbandingan). Tidak menyentuh
# bot live — murni riset untuk memilih perubahan yang benar-benar menambah edge.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 365, 730)"
        required: false
        default: "730"

permissions:
  contents: write

concurrency:
  group: smc-ablation
  cancel-in-progress: false

jobs:
  ablation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ablation study
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '730' }}
        run: python -m scripts.ablation
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/ablation.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "chore: hasil ablation study [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin claude/fib-hybrid-trading-bot-elzm69 && git push && break
              echo "push retry $i"; sleep 3
            done
          fi
