name: SMC plateau test

# Uji plateau/curve-fit: sweep tiap parameter inti di sekitar nilai live pada
# data asli, tulis docs/data/plateau.json. Tidak menyentuh bot live — riset.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Hari data historis (mis. 365, 730)"
        required: false
        default: "730"

permissions:
  contents: write

concurrency:
  group: smc-plateau
  cancel-in-progress: false

jobs:
  plateau:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run plateau sweep
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.days || '730' }}
        run: python -m scripts.plateau
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/data/plateau.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
          else
            git commit -m "chore: hasil plateau test [skip ci]"
            for i in 1 2 3 4; do
              git pull --rebase origin claude/fib-hybrid-trading-bot-elzm69 && git push && break
              echo "push retry $i"; sleep 3
            done
          fi
